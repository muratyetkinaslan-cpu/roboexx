# Render Blueprint — RoboExx Canlı Paylaşım Sunucusu
#
# https://render.com'da Yeni Service oluştururken bu dosya otomatik okunur.
# Veya manuel dashboard'dan da kurulabilir:
#   Type: Web Service
#   Root Directory: server
#   Build Command: npm install
#   Start Command: npm start
#   Environment: Node
#   Plan: Free
#
# Kullanıcı render.com → New → Blueprint → GitHub repo seç → Apply
services:
  - type: web
    name: roboexx-collab
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      # PORT otomatik Render tarafından set edilir
    healthCheckPath: /

  # Arduino derleme sunucusu — arduino-cli gerektirdiği için Docker ile.
  # (Dockerfile: server/compile-deploy/Dockerfile)
  - type: web
    name: roboexx-arduino-compile
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: server/compile-deploy/Dockerfile
    dockerContext: .
    envVars:
      # İstersen kendi site adresinle kısıtla:
      # - key: ALLOWED_ORIGIN
      #   value: https://senin-siten.vercel.app
      - key: PORT
        value: "8080"
    healthCheckPath: /health
